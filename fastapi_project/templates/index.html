<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Button</title>
</head>
<body>
    <div>
        <button id="btnClick">get number</button>
        <button id="setContent">set number</button>
        <input type="text" id="inputContent" placeholder="Enter number">
        <!-- <p id="content" style="display: none;">{{content}}</p> -->
    </div>
</body>
<script>
    const inputContent = document.getElementById("inputContent");

    // get number function
    const btnClick = document.getElementById("btnClick");
    // const content = document.getElementById("content");

    btnClick.addEventListener("click", async () => {
        try {
            const response = await fetch("/get_number");

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            console.log(data);
            inputContent.value = data.number;
            // inputContent.style.display = "block";
        } catch (error) {
            console.error("Failed to fetch number:", error);
            inputContent.value = 0;
            // inputContent.style.display = "block";
        }
    });

    // set number function
    const btnSetContent = document.getElementById("setContent");
    
    btnSetContent.addEventListener("click", async() => {
        const newNumber = inputContent.value;

        try {
            const response = await fetch("/set_number/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ number: newNumber })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            console.log(data);
            alert("Number updated successfully!");
        } catch (error) {
            console.error("Failed to set number:", error);
            alert("Failed to update number");
        }
    });
</script>
</html>
